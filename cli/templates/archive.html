{% extends "base.html" %}
{% block title %}{{ year }}年{{ month }}月 | {{ blog_name }}{% endblock %}
{% block content %}
<h2>{{ year }}年{{ month }}月の記事</h2>
<ul class="article-list">
{% for article in articles %}
  <li>
    <a href="/articles/{{ article.id }}/">{{ article.title }}</a>
    <time>{{ article.created_at }}</time>
  </li>
{% endfor %}
</ul>
{% endblock %}
